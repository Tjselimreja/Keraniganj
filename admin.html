<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — কেরানীগঞ্জ.com</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f2f7; --white: #fff; --primary: #1a6b3c; --primary-light: #e8f5ee;
    --danger: #e53935; --danger-light: #fdecea; --text: #1c1c1e; --text-2: #48484a;
    --text-3: #8e8e93; --border: #e5e5ea; --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 14px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Hind Siliguri','DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

  /* TOPBAR */
  .topbar { background:var(--white); padding:0 16px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border); box-shadow:0 1px 8px rgba(0,0,0,0.05); }
  .logo { display:flex; align-items:center; gap:8px; font-family:'DM Sans',sans-serif; font-weight:700; font-size:17px; color:var(--primary); }
  .logo-icon { width:32px; height:32px; background:var(--primary); border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; font-size:14px; }
  .admin-badge { background:#1a3a6b; color:white; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; font-family:'DM Sans',sans-serif; }
  .logout-btn { background:var(--bg); border:none; border-radius:20px; padding:5px 12px; font-size:12px; font-weight:600; color:var(--text-2); cursor:pointer; display:none; font-family:'DM Sans',sans-serif; }

  /* LOGIN */
  .login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:calc(100vh - 56px); padding:24px; }
  .login-card { background:var(--white); border-radius:20px; padding:32px 24px; box-shadow:var(--shadow); width:100%; max-width:360px; }
  .login-icon { font-size:48px; text-align:center; margin-bottom:16px; }
  .login-title { font-size:22px; font-weight:700; margin-bottom:6px; font-family:'Hind Siliguri',sans-serif; text-align:center; }
  .login-sub { font-size:13px; color:var(--text-3); margin-bottom:24px; font-family:'Hind Siliguri',sans-serif; text-align:center; }
  .form-group { margin-bottom:14px; }
  .form-label { font-size:13px; font-weight:600; color:var(--text-2); margin-bottom:6px; display:block; font-family:'Hind Siliguri',sans-serif; }
  .form-input { width:100%; padding:12px 14px; background:var(--bg); border:1px solid var(--border); border-radius:10px; font-size:14px; color:var(--text); font-family:'Hind Siliguri',sans-serif; outline:none; transition:border-color 0.15s; }
  .form-input:focus { border-color:var(--primary); }
  .login-btn { width:100%; padding:13px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; font-family:'Hind Siliguri',sans-serif; margin-top:4px; transition:background 0.15s; }
  .login-btn:hover { background:#155c32; }
  .error-msg { background:var(--danger-light); color:var(--danger); padding:10px 14px; border-radius:10px; font-size:13px; font-family:'Hind Siliguri',sans-serif; margin-top:12px; display:none; text-align:center; }

  /* DASHBOARD */
  .dashboard { display:none; padding-bottom:30px; }

  /* STATS */
  .stats-row { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:14px 16px; }
  .stat-card { background:var(--white); border-radius:var(--radius-sm); padding:14px; box-shadow:var(--shadow); }
  .stat-num { font-size:28px; font-weight:700; font-family:'DM Sans',sans-serif; }
  .stat-label { font-size:12px; color:var(--text-3); font-family:'Hind Siliguri',sans-serif; margin-top:2px; }
  .stat-card.s1 .stat-num { color:#856404; }
  .stat-card.s2 .stat-num { color:#004085; }
  .stat-card.s3 .stat-num { color:var(--primary); }
  .stat-card.s4 .stat-num { color:#6a0dad; }

  /* TABS */
  .tabs { display:flex; background:var(--white); border-bottom:1px solid var(--border); position:sticky; top:56px; z-index:50; }
  .tab { flex:1; padding:12px 8px; text-align:center; font-size:13px; font-weight:600; color:var(--text-3); cursor:pointer; border-bottom:2px solid transparent; border:none; background:none; font-family:'Hind Siliguri',sans-serif; transition:all 0.15s; }
  .tab.active { color:var(--primary); border-bottom:2px solid var(--primary); }
  .tab-badge { display:inline-flex; align-items:center; justify-content:center; background:var(--danger); color:white; font-size:10px; font-weight:700; min-width:16px; height:16px; border-radius:8px; margin-left:4px; padding:0 4px; font-family:'DM Sans',sans-serif; }

  /* TAB CONTENT */
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  /* SECTION */
  .section-header { padding:14px 16px 8px; display:flex; align-items:center; justify-content:space-between; }
  .section-title { font-size:15px; font-weight:700; font-family:'Hind Siliguri',sans-serif; }
  .refresh-btn { background:var(--primary-light); color:var(--primary); border:none; border-radius:20px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; }

  /* ITEM CARD */
  .item-card { margin:0 16px 10px; background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .item-header { padding:12px 14px 8px; display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .item-meta { font-size:11px; color:var(--text-3); font-family:'DM Sans',sans-serif; margin-bottom:4px; }
  .item-title { font-size:14px; font-weight:600; font-family:'Hind Siliguri',sans-serif; line-height:1.4; }
  .item-body { font-size:13px; color:var(--text-2); padding:0 14px 10px; line-height:1.5; font-family:'Hind Siliguri',sans-serif; }
  .item-actions { display:flex; border-top:1px solid var(--border); }
  .action-btn { flex:1; padding:11px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:'Hind Siliguri',sans-serif; transition:background 0.15s; display:flex; align-items:center; justify-content:center; gap:5px; background:none; }
  .action-btn.approve { background:var(--primary-light); color:var(--primary); }
  .action-btn.reject { background:var(--danger-light); color:var(--danger); }
  .action-btn.del { background:#fff3cd; color:#856404; }
  .action-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .action-divider { width:1px; background:var(--border); flex-shrink:0; }

  /* STATUS BTNS */
  .status-row { display:flex; gap:6px; padding:6px 14px 12px; flex-wrap:wrap; }
  .status-btn { padding:5px 12px; border-radius:20px; border:2px solid transparent; font-size:12px; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .status-btn.pending { background:#fff3cd; color:#856404; }
  .status-btn.progress { background:#cce5ff; color:#004085; }
  .status-btn.solved { background:#d4edda; color:#155724; }
  .status-btn.active-s { border-color:currentColor; }

  /* BADGE */
  .badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:600; font-family:'DM Sans',sans-serif; white-space:nowrap; }
  .bp { background:#fff3cd; color:#856404; }
  .ba { background:var(--primary-light); color:var(--primary); }
  .br { background:var(--danger-light); color:var(--danger); }
  .bpg { background:#cce5ff; color:#004085; }
  .bs { background:#d4edda; color:#155724; }

  /* EMPTY / LOADING */
  .empty-state { text-align:center; padding:48px 24px; color:var(--text-3); }
  .empty-icon { font-size:40px; margin-bottom:12px; }
  .empty-text { font-size:14px; font-family:'Hind Siliguri',sans-serif; }
  .loading { text-align:center; padding:32px; color:var(--text-3); font-family:'Hind Siliguri',sans-serif; font-size:14px; }

  /* CONFIRM */
  .confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center; padding:24px; }
  .confirm-overlay.open { display:flex; }
  .confirm-box { background:var(--white); border-radius:16px; padding:24px; width:100%; max-width:300px; text-align:center; }
  .confirm-title { font-size:17px; font-weight:700; margin-bottom:8px; font-family:'Hind Siliguri',sans-serif; }
  .confirm-msg { font-size:13px; color:var(--text-2); margin-bottom:20px; font-family:'Hind Siliguri',sans-serif; line-height:1.5; }
  .confirm-btns { display:flex; gap:10px; }
  .confirm-yes { flex:1; padding:12px; background:var(--danger); color:white; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Hind Siliguri',sans-serif; }
  .confirm-no { flex:1; padding:12px; background:var(--bg); color:var(--text-2); border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Hind Siliguri',sans-serif; }

  /* TOAST */
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#1c1c1e; color:white; padding:10px 20px; border-radius:20px; font-size:13px; font-family:'Hind Siliguri',sans-serif; opacity:0; transition:all 0.3s; pointer-events:none; z-index:300; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">⚙️</div>
    কেরানীগঞ্জ <span class="admin-badge">ADMIN</span>
  </div>
  <button class="logout-btn" id="logout-btn" onclick="doLogout()">লগআউট</button>
</div>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">Admin লগইন</div>
    <div class="login-sub">Username ও Password দিয়ে প্রবেশ করুন</div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="admin username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">লগইন করুন</button>
    <div class="error-msg" id="error-msg">❌ Username বা Password ভুল হয়েছে</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="stats-row">
    <div class="stat-card s1"><div class="stat-num" id="stat-pn">0</div><div class="stat-label">⏳ অপেক্ষমাণ পোস্ট</div></div>
    <div class="stat-card s2"><div class="stat-num" id="stat-pc">0</div><div class="stat-label">🚨 নতুন অভিযোগ</div></div>
    <div class="stat-card s3"><div class="stat-num" id="stat-tn">0</div><div class="stat-label">📰 মোট পোস্ট</div></div>
    <div class="stat-card s4"><div class="stat-num" id="stat-tc">0</div><div class="stat-label">📋 মোট অভিযোগ</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-news" onclick="switchTab('news')">📰 পোস্ট <span class="tab-badge" id="news-badge" style="display:none">0</span></button>
    <button class="tab" id="tab-complaints" onclick="switchTab('complaints')">🚨 অভিযোগ <span class="tab-badge" id="complaint-badge" style="display:none">0</span></button>
  </div>

  <div class="tab-content active" id="content-news">
    <div class="section-header">
      <span class="section-title">পোস্ট পর্যালোচনা</span>
      <button class="refresh-btn" onclick="loadNews()">↻ রিফ্রেশ</button>
    </div>
    <div id="news-list"><div class="loading">লোড হচ্ছে...</div></div>
  </div>

  <div class="tab-content" id="content-complaints">
    <div class="section-header">
      <span class="section-title">অভিযোগ ব্যবস্থাপনা</span>
      <button class="refresh-btn" onclick="loadComplaints()">↻ রিফ্রেশ</button>
    </div>
    <div id="complaint-list"><div class="loading">লোড হচ্ছে...</div></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title">মুছে ফেলবেন?</div>
    <div class="confirm-msg">এই আইটেমটি স্থায়ীভাবে মুছে যাবে।</div>
    <div class="confirm-btns">
      <button class="confirm-yes" id="confirm-yes">হ্যাঁ, মুছুন</button>
      <button class="confirm-no" onclick="closeConfirm()">বাতিল</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBHagEJrvZCyD8XHIqdNzGE39hr7jiDiQw",
  authDomain: "keraniganj-dbf1b.firebaseapp.com",
  projectId: "keraniganj-dbf1b",
  storageBucket: "keraniganj-dbf1b.firebasestorage.app",
  messagingSenderId: "252291358700",
  appId: "1:252291358700:web:4a2318ccf1d172152b2ac9"
};

// ── Admin credentials — পরে বদলে নাও ──
const ADMINS = [
  { username: "admin", password: "keraniganj2024" },
  // আরো admin যোগ করতে পারো:
  // { username: "tj", password: "yourpassword" }
];

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isLoggedIn = false;

// Check session
if (sessionStorage.getItem('admin_logged_in') === 'true') {
  showDashboard();
}

window.doLogin = () => {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const match = ADMINS.find(a => a.username === username && a.password === password);
  if (match) {
    sessionStorage.setItem('admin_logged_in', 'true');
    showDashboard();
  } else {
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('password').value = '';
  }
};

window.doLogout = () => {
  sessionStorage.removeItem('admin_logged_in');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  showToast('লগআউট সফল হয়েছে');
};

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('logout-btn').style.display = 'block';
  isLoggedIn = true;
  loadNews();
  loadComplaints();
}

// ── LOAD NEWS ──
window.loadNews = async () => {
  const list = document.getElementById('news-list');
  list.innerHTML = '<div class="loading">লোড হচ্ছে...</div>';
  try {
    const snap = await getDocs(query(collection(db, 'news'), orderBy('createdAt', 'desc')));
    let pending = 0;
    document.getElementById('stat-tn').textContent = snap.size;
    if (snap.empty) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">কোনো পোস্ট নেই</div></div>'; return; }
    list.innerHTML = '';
    snap.forEach(d => {
      const data = d.data(), id = d.id;
      const status = data.status || 'pending';
      if (status === 'pending') pending++;
      const bMap = { pending:['bp','⏳ অপেক্ষমাণ'], approved:['ba','✅ অনুমোদিত'], rejected:['br','❌ প্রত্যাখ্যাত'] };
      const [bc, bt] = bMap[status] || bMap.pending;
      list.innerHTML += `
        <div class="item-card">
          <div class="item-header">
            <div style="flex:1">
              <div class="item-meta">${data.anonymous?'익명':(data.authorName||'অজ্ঞাত')} • ${getTimeAgo(data.createdAt)} • ${data.category||'সাধারণ'}</div>
              <div class="item-title">${data.title||data.body?.substring(0,60)}</div>
            </div>
            <span class="badge ${bc}">${bt}</span>
          </div>
          <div class="item-body">${data.body?.substring(0,150)}${data.body?.length>150?'...':''}</div>
          <div class="item-actions">
            <button class="action-btn approve" onclick="approveNews('${id}')" ${status==='approved'?'disabled':''}>✅ অনুমোদন</button>
            <div class="action-divider"></div>
            <button class="action-btn reject" onclick="rejectNews('${id}')" ${status==='rejected'?'disabled':''}>❌ প্রত্যাখ্যান</button>
            <div class="action-divider"></div>
            <button class="action-btn del" onclick="confirmDelete('news','${id}')">🗑️ মুছুন</button>
          </div>
        </div>`;
    });
    document.getElementById('stat-pn').textContent = pending;
    const badge = document.getElementById('news-badge');
    if (pending > 0) { badge.textContent = pending; badge.style.display = 'inline-flex'; } else badge.style.display = 'none';
  } catch(e) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">লোড করতে সমস্যা হয়েছে</div></div>';
  }
};

// ── LOAD COMPLAINTS ──
window.loadComplaints = async () => {
  const list = document.getElementById('complaint-list');
  list.innerHTML = '<div class="loading">লোড হচ্ছে...</div>';
  try {
    const snap = await getDocs(query(collection(db, 'complaints'), orderBy('createdAt', 'desc')));
    let pending = 0;
    document.getElementById('stat-tc').textContent = snap.size;
    if (snap.empty) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">কোনো অভিযোগ নেই</div></div>'; return; }
    list.innerHTML = '';
    snap.forEach(d => {
      const data = d.data(), id = d.id;
      const status = data.status || 'pending';
      if (status === 'pending') pending++;
      const bMap = { pending:['bp','⏳ অপেক্ষমাণ'], progress:['bpg','🔄 চলমান'], solved:['bs','✅ সমাধান'] };
      const [bc, bt] = bMap[status] || bMap.pending;
      const icons = {রাস্তা:'🛣️',পানি:'💧',বিদ্যুৎ:'⚡',দুর্নীতি:'🚫',বর্জ্য:'🗑️',শিক্ষা:'🏫'};
      const icon = icons[data.category]||'📋';
      list.innerHTML += `
        <div class="item-card">
          <div class="item-header">
            <div style="flex:1">
              <div class="item-meta">${icon} ${data.category} • ${data.anonymous?'익명':(data.authorName||'অজ্ঞাত')} • ${getTimeAgo(data.createdAt)} • 👍 ${data.votes||0}</div>
              <div class="item-title">${data.title}</div>
            </div>
            <span class="badge ${bc}">${bt}</span>
          </div>
          <div class="item-body">${data.body?.substring(0,150)}${data.body?.length>150?'...':''}</div>
          <div class="status-row">
            <button class="status-btn pending ${status==='pending'?'active-s':''}" onclick="updateStatus('${id}','pending')">⏳ অপেক্ষমাণ</button>
            <button class="status-btn progress ${status==='progress'?'active-s':''}" onclick="updateStatus('${id}','progress')">🔄 চলমান</button>
            <button class="status-btn solved ${status==='solved'?'active-s':''}" onclick="updateStatus('${id}','solved')">✅ সমাধান</button>
          </div>
          <div class="item-actions">
            <button class="action-btn del" onclick="confirmDelete('complaints','${id}')">🗑️ মুছে ফেলুন</button>
          </div>
        </div>`;
    });
    document.getElementById('stat-pc').textContent = pending;
    const badge = document.getElementById('complaint-badge');
    if (pending > 0) { badge.textContent = pending; badge.style.display = 'inline-flex'; } else badge.style.display = 'none';
  } catch(e) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">লোড করতে সমস্যা হয়েছে</div></div>';
  }
};

window.approveNews = async (id) => {
  await updateDoc(doc(db,'news',id), {status:'approved', verified:true});
  showToast('✅ পোস্ট অনুমোদিত'); loadNews();
};
window.rejectNews = async (id) => {
  await updateDoc(doc(db,'news',id), {status:'rejected', verified:false});
  showToast('❌ পোস্ট প্রত্যাখ্যাত'); loadNews();
};
window.updateStatus = async (id, status) => {
  await updateDoc(doc(db,'complaints',id), {status});
  const l = {pending:'অপেক্ষমাণ', progress:'চলমান', solved:'সমাধান'};
  showToast(`স্ট্যাটাস: ${l[status]}`); loadComplaints();
};

let delTarget = null;
window.confirmDelete = (col, id) => {
  delTarget = {col, id};
  document.getElementById('confirm-yes').onclick = doDelete;
  document.getElementById('confirm-overlay').classList.add('open');
};
window.closeConfirm = () => { document.getElementById('confirm-overlay').classList.remove('open'); delTarget = null; };
async function doDelete() {
  if (!delTarget) return;
  closeConfirm();
  await deleteDoc(doc(db, delTarget.col, delTarget.id));
  showToast('🗑️ মুছে ফেলা হয়েছে');
  if (delTarget.col === 'news') loadNews(); else loadComplaints();
}

window.switchTab = (name) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('content-'+name).classList.add('active');
};

function getTimeAgo(ts) {
  if (!ts) return 'এইমাত্র';
  const diff = Math.floor((new Date() - (ts.toDate ? ts.toDate() : new Date(ts))) / 1000);
  if (diff < 60) return 'এইমাত্র';
  if (diff < 3600) return `${Math.floor(diff/60)} মিনিট আগে`;
  if (diff < 86400) return `${Math.floor(diff/3600)} ঘণ্টা আগে`;
  return `${Math.floor(diff/86400)} দিন আগে`;
}

let tt;
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2500);
};
</script>
